name: Blueprint

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build And Publish Blueprint
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl git graphviz libgraphviz-dev pkg-config

      - name: Install Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve Lake dependencies
        run: lake update checkdecls

      - name: Build proof surface for declaration checks
        run: |
          lake build Microvmm
          lake build MicrovmmProof
          lake build Microvmm.Proof

      - name: Install leanblueprint
        run: |
          python -m pip install --upgrade pip
          python -m pip install leanblueprint

      - name: Generate blueprint web output
        run: leanblueprint web

      - name: Validate blueprint declarations
        run: leanblueprint checkdecls

      - name: Stage GitHub Pages site
        run: |
          mkdir -p _site/blueprint
          cp -R blueprint/web/. _site/blueprint/
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=./blueprint/">
              <title>Microvmm Blueprint</title>
            </head>
            <body>
              <p>Redirecting to <a href="./blueprint/">the Microvmm blueprint</a>.</p>
            </body>
          </html>
          EOF
          touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
